<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>وزارة الصحة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="main-header">
        <div class="ns-badge">NS x 79 RIYADH</div>
        <h1>وزارة الصحة</h1>
        <div class="datetime-display">
            <span><i class="far fa-calendar-alt"></i> <span id="dateDisplay">--</span></span>
            <span><i class="far fa-clock"></i> <span id="timeDisplay">00:00:00</span></span>
        </div>
    </header>

    <div class="container">
        <div class="box">
            <div class="input-box">
                <input type="text" id="empSearchInput" class="input-style" placeholder="أدخل الكود">
                <button class="btn-blue" onclick="searchEmp()">استعلام</button>
            </div>
            <div id="resultPanel"></div>
        </div>

        <div class="nav-card" onclick="openPopup('uniformPop')">
            <div class="icon-box"><i class="fas fa-tshirt"></i></div>
            <div class="info-box"><h3>دليل الزي الرسمي</h3></div>
        </div>

        <div class="admin-trigger" onclick="loginAdmin()">دخول لوحة الإدارة (Admin)</div>

        <div id="adminArea" class="box" style="display:none;">
            <input type="text" id="admId" class="input-style" placeholder="الكود">
            <input type="text" id="admRank" class="input-style" placeholder="الرتبة">
            <input type="text" id="admStatus" class="input-style" placeholder="المخالفات">
            <button class="btn-blue" onclick="saveData()">حفظ</button>
        </div>
    </div>

    <div id="uniformPop" class="modal"><div class="modal-content"><i class="fas fa-times close-btn" onclick="closePopup('uniformPop')"></i><h2>دليل الزي</h2><p>الزي الرسمي المعتمد لقطاع الرياض.</p></div></div>

    <script src="script.js"></script>
</body>
</html>
